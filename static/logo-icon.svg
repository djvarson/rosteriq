<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle - brand blue -->
  <circle cx="32" cy="32" r="30" fill="#0ea5e9" />
  <!-- Inner face -->
  <circle cx="32" cy="32" r="24" fill="white" />
  <!-- Hour marks -->
  <circle cx="32" cy="12" r="2.5" fill="#111" />
  <circle cx="32" cy="52" r="2.5" fill="#111" />
  <circle cx="12" cy="32" r="2.5" fill="#111" />
  <circle cx="52" cy="32" r="2.5" fill="#111" />
  <!-- Minute hand -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="#111" stroke-width="3.5" stroke-linecap="round" />
  <!-- Hour hand - brand blue -->
  <line x1="32" y1="32" x2="44" y2="42" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round" />
  <!-- Staff dots - brand colours -->
  <circle cx="20" cy="18" r="3.5" fill="#0ea5e9" opacity="0.8" />
  <circle cx="44" cy="18" r="3.5" fill="#22c55e" opacity="0.8" />
  <circle cx="48" cy="28" r="3.5" fill="#f59e0b" opacity="0.75" />
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#111" />
</svg>
