name: RosterIQ CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx fastapi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint — syntax check all modules
        run: |
          python -m py_compile rosteriq/__init__.py
          for f in rosteriq/*.py; do
            python -m py_compile "$f" && echo "  OK $f" || exit 1
          done

      - name: Run core tests (no external deps)
        run: python run_all_tests.py --fast

      - name: Run full test suite (with all deps)
        run: python run_all_tests.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check rosteriq/ tests/ --select E9,F63,F7,F82 --no-fix
        # E9 = runtime errors, F63 = assertion issues, F7 = syntax, F82 = undefined names
        # Strict subset — catches real bugs, not style nits
