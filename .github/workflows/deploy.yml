name: Deploy to Railway

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check rosteriq/ --select=E,W,F
          echo "✓ Ruff linting passed"

      - name: Run Ruff formatter check
        run: |
          ruff format --check rosteriq/
          echo "✓ Code formatting check passed"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rosteriq
          POSTGRES_PASSWORD: rosteriq
          POSTGRES_DB: rosteriq_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Python syntax check
        run: |
          python -m py_compile rosteriq/auth.py
          python -m py_compile rosteriq/feed_runner.py
          python -m py_compile rosteriq/api.py
          echo "✓ All Python files compile successfully"

      - name: Basic import tests
        run: |
          python -c "from rosteriq.auth import create_access_token, verify_password, hash_password; print('✓ auth module imports OK')"
          python -c "from rosteriq.feed_runner import create_free_aggregator, FeedScheduler; print('✓ feed_runner module imports OK')"
          echo "✓ All imports successful"

      - name: Run pytest (if test suite exists)
        run: |
          if [ -f "pytest.ini" ] || [ -d "tests/" ]; then
            pytest -v --tb=short
          else
            echo "⚠ No pytest configuration found, skipping pytest"
          fi

  deploy:
    name: Deploy to Railway
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railway-app/action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          environment: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}

      - name: Verify deployment
        run: |
          echo "Deployment to Railway completed!"
          echo "Monitor your deployment at: https://railway.app"

      - name: Post-deployment checks
        run: |
          echo "✓ Deployment triggered successfully"
          echo "Next steps:"
          echo "  1. Check Railway dashboard for build and deployment status"
          echo "  2. Verify application health at the Railway URL"
          echo "  3. Check logs in Railway dashboard for any errors"
